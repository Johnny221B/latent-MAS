model:
  name: "Qwen/Qwen3-4B"
  frozen: true
  dtype: "bfloat16"

graph:
  config: "configs/graphs/default_5agent.json"
  roles_dir: "configs/roles"

compressor:
  num_queries: 16
  num_heads: 8
  dropout: 0.1

training:
  task: "arc_easy"
  input_mode: "chat_with_prefix"
  batch_size: 1
  lr: 0.0005
  weight_decay: 0.01
  epochs: 1
  max_seq_len: 2048
  lambda_add: 0.1
  lambda_drop: 0.005
  lambda_sparse: 0.005
  gradient_accumulation_steps: 1
  log_interval: 1
  save_interval: 1000
  drop_last: false

evaluation:
  run_after_train: true
  splits_after_train: ["test"]
  test_probe_samples: 4
  inference_mode: "chat_with_prefix"
  max_new_tokens: 32
  batch_size: 1
  do_sample: false

reasoning:
  steps_per_agent: 8
  compress_last_k: 8

output:
  dir: "outputs/arc_easy_qwen3-4b_smoke"
  log_dir: "logs"

report:
  use_wandb: false
  project: "latent-mas"
  key_env: "WANDB_API_KEY"
  env_file: ".env"
  mode: "disabled"
