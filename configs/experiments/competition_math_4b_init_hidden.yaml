model:
  name: "/mnt/3fs/data/yfzhang/workspace/toby/latent-MAS/.cache/Qwen3-4B"
  frozen: true
  dtype: "bfloat16"
  enable_thinking: true

graph:
  config: "configs/graphs/hierarchical_6agent.json"
  init_scale: 0.0
  fixed_structure: true
  freeze_topology: false
  aggregation_mode: "concat"
  roles_dir: "configs/roles"

compressor:
  num_queries: 16
  num_heads: 8
  num_layers: 1
  per_agent: true
  per_agent_pp: true
  dropout: 0.1

training:
  task: "competition_math"
  train_strategy: "communication_only"
  input_mode: "chat_with_prefix"
  e2e_gradient: true
  batch_size: 2
  lr: 0.00005
  adjacency_lr: 0.01
  weight_decay: 0.01
  epochs: 2
  max_seq_len: 8192
  lambda_struct: 0.0
  lambda_sparse: 0.001
  lambda_concentrate: 0.02
  use_amp: true
  gradient_accumulation_steps: 8
  log_interval: 1
  save_interval: 5000
  save_final_checkpoint: true
  seed: 42
  shuffle: true
  train_base_model: false
  resume_from_checkpoint: null
  w_add: 1.0
  w_drop: 3.0

training_probe:
  enabled: false
  samples: 100
  seed: 42
  every_n_steps: 0
  batch_size: 1
  max_new_tokens: 64
  degenerate_max_new_tokens_ratio: 0.5
  write_predictions_json: false
  write_agent_logs: false

evaluation:
  run_after_train: false

reasoning:
  steps_per_agent: 2
  compress_last_k: 2

output:
  dir: "/mnt/3fs/data/yfzhang/workspace/toby/latent-MAS/outputs/dev/e2e_4b_init_hidden"
  log_dir: "logs"

report:
  use_wandb: false
  project: "latent-mas"
  key_env: "WANDB_API_KEY"
  env_file: ".env"
  mode: "offline"
