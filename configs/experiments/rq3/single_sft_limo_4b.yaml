# RQ3 Baseline 2: Single agent SFT (full fine-tune), limo (119 samples)
model:
  name: "Qwen/Qwen3-4B"
  dtype: bfloat16
  frozen: false

graph:
  config: "configs/graphs/single_agent.json"
  roles_dir: "configs/roles"
  freeze_topology: true

compressor:
  num_queries: 16
  num_heads: 8
  dropout: 0.1
  num_layers: 1

training:
  task: "am_deepseek_r1_distilled"
  source: "limo"
  train_strategy: "full_finetune"
  input_mode: "chat_with_prefix"
  global_system_prompt: "configs/roles/system_prompts/thinking.json"
  batch_size: 2
  lr: 0.000005
  weight_decay: 0.01
  epochs: 2
  max_seq_len: 16384
  use_amp: true
  lambda_sparse: 0.0
  lambda_concentrate: 0.0
  gradient_accumulation_steps: 4
  log_interval: 1
  save_interval: 5000

reasoning:
  steps_per_agent: 20
  compress_last_k: 20

output:
  dir: "outputs/rq3/single_sft_limo_4b"
  log_dir: "logs"

report:
  use_wandb: true
  project: "latent-mas"
  key_env: "WANDB_API_KEY"
  env_file: ".env"
  mode: "online"
