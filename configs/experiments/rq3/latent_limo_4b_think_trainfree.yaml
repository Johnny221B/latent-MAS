# RQ3: Training-free latent communication, fixed sequential graph, thinking mode
model:
  name: "Qwen/Qwen3-4B"
  dtype: bfloat16
  frozen: true
  enable_thinking: true

graph:
  config: "configs/graphs/chain_4agent.json"
  roles_dir: "configs/roles"
  init_scale: 6.0
  freeze_topology: true

compressor:
  num_queries: 16
  num_heads: 8
  dropout: 0.1
  num_layers: 1

training:
  task: "am_deepseek_r1_distilled"
  source: "limo"
  train_strategy: "communication_only"
  input_mode: "chat_with_prefix"
  global_system_prompt: "configs/roles/system_prompts/thinking.json"
  batch_size: 2
  lr: 0.00001
  adjacency_lr: 0.0
  weight_decay: 0.01
  epochs: 0
  max_seq_len: 16384
  use_amp: true
  lambda_sparse: 0.0
  lambda_concentrate: 0.0
  gradient_accumulation_steps: 4
  log_interval: 1
  save_interval: 5000

evaluation:
  run_after_train: false

reasoning:
  steps_per_agent: 20
  compress_last_k: 20

output:
  dir: "outputs/rq3/latent_limo_4b_think_trainfree"
  log_dir: "logs"

report:
  use_wandb: false
